services:
  app:
    restart: unless-stopped
    build:
      context: .
      secrets:
        - redis_url
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      target: builder
    command: ["npx", "drizzle-kit", "migrate"]
    env_file:
      - .env
    environment:
      NUXT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wallflow
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-wallflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

secrets:
  redis_url:
    environment: REDIS_URL

volumes:
  postgres_data:
